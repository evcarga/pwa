<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Campaña - Fajardo Presidente</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1B3679">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; display: flex; flex-direction: column; align-items: center; padding: 15px; color: #333; margin: 0; overscroll-behavior: none; }
        h2 { color: #1B3679; margin-bottom: 10px; text-align: center; font-size: 1.5rem; }
        .editor-container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; width: 100%; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .canvas-wrapper { position: relative; margin: 20px 0; border-radius: 50%; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: grab; width: 100%; max-width: 400px; aspect-ratio: 1 / 1; height: auto; border: 4px solid #fff; background-color: #ddd; touch-action: none; }
        .canvas-wrapper:active { cursor: grabbing; }
        canvas { display: block; width: 100%; height: 100%; }
        .controls { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .control-row { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 12px; border-radius: 8px; }
        label { font-weight: 700; font-size: 0.9em; color: #1B3679; text-transform: uppercase; white-space: nowrap; }
        input[type="range"] { flex-grow: 1; margin-left: 15px; cursor: pointer; accent-color: #1B3679; height: 25px; }
        .file-btn { display: block; width: 100%; padding: 15px; text-align: center; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 5px; border: 2px dashed #1B3679; background: white; color: #1B3679; transition: 0.3s; position: relative; box-sizing: border-box; }
        .file-btn:active { background: #f0f0f0; }
        .file-btn input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        button#downloadBtn, button#installBtn { background-color: #1B3679; color: white; border: none; padding: 18px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; box-shadow: 0 4px 10px rgba(27, 54, 121, 0.3); }
        button#installBtn { background-color: #DC2329; margin-top: 5px; }
        button:hover { background-color: #132759; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .credits { margin-top: 20px; font-size: 0.85rem; color: #666; text-align: center; }
        .credits a { color: #1B3679; text-decoration: none; font-weight: bold; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>

    <h2>Foto de Campaña</h2>

    <div class="editor-container">
        <!-- BOTÓN DE INSTALAR (aparece automáticamente) -->
        <button id="installBtn" style="display:none;">📱 INSTALAR COMO APP</button>

        <div class="controls">
            <div class="file-btn">
                <span>📷 TOCAR PARA SUBIR FOTO</span>
                <input type="file" id="uploadInput" accept="image/*">
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="mainCanvas" width="770" height="770"></canvas>
        </div>

        <div class="controls">
            <div class="control-row">
                <label>Tamaño Foto</label>
                <input type="range" id="photoScale" min="0.1" max="3" step="0.05" value="1" disabled>
            </div>
            <button id="downloadBtn" disabled>DESCARGAR IMAGEN</button>
        </div>

        <div class="credits">
            Creado por: <a href="https://www.instagram.com/andres_santage" target="_blank">@andres_santage</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const uploadInput = document.getElementById('uploadInput');
        const photoScaleSlider = document.getElementById('photoScale');
        const downloadBtn = document.getElementById('downloadBtn');
        const installBtn = document.getElementById('installBtn');

        const config = {
            colorYellow: "#FCCC0A", colorBlue: "#1B3679", colorRed: "#DC2329",
            topText: "CAMBIO. SERIO. SEGURO.", bottomText: "FAJARDO PRESIDENTE",
            canvasSize: 770, pathRadius: 329, strokeWidth: 80, fontSize: 63
        };

        let userImage = null;
        let frameImage = new Image();
        let photoState = { x: 0, y: 0, scale: 1 };
        let isDraggingPhoto = false;
        let startDragX, startDragY;
        let deferredPrompt;

        function createSVGFrame() {
            const size = config.canvasSize; const cx = size/2; const cy = size/2; const r = config.pathRadius;
            const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
                <defs>
                    <linearGradient id="flag" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="${config.colorYellow}"/>
                        <stop offset="50%" stop-color="${config.colorYellow}"/>
                        <stop offset="50%" stop-color="${config.colorBlue}"/>
                        <stop offset="75%" stop-color="${config.colorBlue}"/>
                        <stop offset="75%" stop-color="${config.colorRed}"/>
                        <stop offset="100%" stop-color="${config.colorRed}"/>
                    </linearGradient>
                    <path id="topCurve" d="M ${cx-r},${cy} A ${r},${r} 0 0,1 ${cx+r},${cy}" />
                    <path id="bottomCurve" d="M ${cx-r},${cy} A ${r},${r} 0 0,0 ${cx+r},${cy}" />
                </defs>
                <circle cx="${cx}" cy="${cy}" r="277" stroke="${config.colorBlue}" stroke-width="10" fill="none"/>
                <circle cx="${cx}" cy="${cy}" r="${r}" stroke="url(#flag)" stroke-width="${config.strokeWidth}" fill="none"/>
                <circle cx="${cx}" cy="${cy}" r="380" stroke="${config.colorYellow}" stroke-width="10" fill="none"/>
                <text fill="${config.colorBlue}" font-family="Impact" font-weight="900" font-size="${config.fontSize}" letter-spacing="1" dy="5">
                    <textPath href="#topCurve" startOffset="50%" text-anchor="middle">CAMBIO. SERIO. SEGURO.</textPath>
                </text>
                <text fill="${config.colorYellow}" font-family="Impact" font-weight="900" font-size="${config.fontSize}" letter-spacing="1" dy="3">
                    <textPath href="#bottomCurve" startOffset="50%" text-anchor="middle">FAJARDO PRESIDENTE</textPath>
                </text>
            </svg>`;
            frameImage.src = URL.createObjectURL(new Blob([svgString], {type:'image/svg+xml'}));
            frameImage.onload = draw;
        }

        uploadInput.addEventListener('change', e => {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = ev => {
                    userImage = new Image();
                    userImage.onload = () => { photoState = {x:0,y:0,scale:1}; photoScaleSlider.disabled = false; downloadBtn.disabled = false; draw(); };
                    userImage.src = ev.target.result;
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.save(); ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, canvas.width/2, 0, Math.PI*2); ctx.clip();
            if (userImage) {
                ctx.save(); ctx.beginPath(); ctx.arc(385,385,268,0,Math.PI*2); ctx.clip();
                const w = userImage.width * photoState.scale;
                const h = userImage.height * photoState.scale;
                ctx.drawImage(userImage, (canvas.width-w)/2 + photoState.x, (canvas.height-h)/2 + photoState.y, w, h);
                ctx.restore();
            }
            if (frameImage.complete) ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        photoScaleSlider.addEventListener('input', e => { photoState.scale = +e.target.value; draw(); });

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {x: (clientX - rect.left)*scaleX, y: (clientY - rect.top)*scaleY};
        }

        function startDrag(e) { if (userImage) { isDraggingPhoto = true; const pos = getPos(e); startDragX = pos.x - photoState.x; startDragY = pos.y - photoState.y; } }
        function dragging(e) { if (!isDraggingPhoto) return; e.preventDefault(); const pos = getPos(e); photoState.x = pos.x - startDragX; photoState.y = pos.y - startDragY; draw(); }
        function endDrag() { isDraggingPhoto = false; }

        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', dragging);
        window.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', startDrag, {passive:false});
        window.addEventListener('touchmove', dragging, {passive:false});
        window.addEventListener('touchend', endDrag);

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'fajardo_presidente.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        createSVGFrame();

        // === PWA BOTÓN DE INSTALAR ===
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
